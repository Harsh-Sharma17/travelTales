<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>

    <div class="wrapper">

        <!-- Top bar: brand + toggle -->
        <div class="top-bar">
            <div class="brand">travel<span>Tales</span></div>

            <input type="checkbox" id="toggle" class="white-mode">
            <label class="toggle-label" for="toggle">
                <span class="toggle-track"></span>
                <span class="toggle-text">Light mode</span>
            </label>
        </div>

        <div class="card">

            <h1>Login</h1>
            <p class="subtitle">Welcome back — your stories are waiting.</p>

            <form id="loginForm" action="/login" method="post">

                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password visibility">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit">Login</button>

            </form>

            <div class="footer-link">
                <a href="register.html">Don't have an account? Register now</a>
            </div>

        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/theme.js"></script>
    
    <script>

        // Password show/hide
        const eyeBtn = document.getElementById('eyeBtn');
        const pwInput = document.getElementById('password');
        eyeBtn.addEventListener('click', () => {
            const show = pwInput.type === 'password';
            pwInput.type = show ? 'text' : 'password';
            eyeBtn.style.color = show ? 'var(--accent)' : 'var(--text-secondary)';
        });
        
    </script>

</body>
</html>
