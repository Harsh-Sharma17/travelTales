<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post — TravelLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/createpost.css">
</head>
<body>

    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">Travel<span>Tales</span></div>

            <nav class="nav">
                <a href="dashboard.html" class="nav-item">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="location.html" class="nav-item">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <span>News</span>
                </a>
                <a href="post.html" class="nav-item">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>My Posts</span>
                </a>
                <a href="#" class="nav-item active">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>Create Post</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>Profile</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <input type="checkbox" id="toggle" class="white-mode">
                <label class="toggle-label" for="toggle">
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <span class="toggle-track"></span>
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </label>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">

            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1 id="user-name">Create Post</h1>
                    <p class="header-sub">Share your travel experience with the world</p>
                </div>
            </div>

            <!-- Cover Image Card -->
            <form id="postForm">

                <div class="card">

                    <div class="card-header">
                        <div class="card-title">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            Cover Image
                        </div>
                    </div>

                    <p class="section-intro">
                        Upload a high-quality photo that represents your journey.
                        Accepted: JPG, PNG, WEBP.
                    </p>

                    <input
                        type="file"
                        id="image"
                        name="image"
                        accept="image/png,image/jpeg,image/jpg,image/webp"
                        hidden
                    >

                    <label for="image" class="upload-zone">

                        <div id="uploadContent">

                            <div class="upload-icon">
                                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17 8 12 3 7 8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                            </div>

                            <p class="upload-text">
                                Drag & Drop or <span>Browse Files</span>
                            </p>

                            <p class="upload-hint">
                                Recommended: 1200 × 800 px
                            </p>

                        </div>

                        <img
                            id="previewImage"
                            src=""
                            alt="Preview"
                            style="display:none;"
                        >

                    </label>

                </div>

                <div class="card">

                    <div class="card-header">
                        <div class="card-title">
                            Post Details
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="title">
                            Post Title <span class="required">*</span>
                        </label>

                        <input
                            type="text"
                            id="title"
                            class="form-input"
                            placeholder="e.g. A Week in the Swiss Alps"
                            required
                        >
                    </div>

                    <div class="form-group">

                        <label class="form-label" for="location">
                            Location
                        </label>

                        <input
                            type="text"
                            id="location"
                            class="form-input"
                            placeholder="e.g. Manali, Himachal Pradesh"
                        >

                    </div>

                    <div class="form-group">

                        <label class="form-label" for="description">
                            Description <span class="required">*</span>
                        </label>

                        <textarea
                            id="description"
                            class="form-textarea"
                            placeholder="Write about your travel experience..."
                            required
                        ></textarea>

                        <p class="char-hint">
                            <span id="char-count">0</span> characters
                        </p>

                    </div>

                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <button type="button" class="btn-outline" onclick="clearForm()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.86"/></svg>
                        Clear
                    </button>
                    <button type="submit" class="btn-primary">
                        <svg width="14" height="14" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                        Publish Post
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="/js/createpost.js"></script>
    <script src="/js/theme.js"></script>

</body>
</html>
